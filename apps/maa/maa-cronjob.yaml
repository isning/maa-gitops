# Scheduled task (CronJob)
apiVersion: batch/v1
kind: CronJob
metadata:
  name: maa-daily-task
  namespace: default
spec:
  # Triggers daily at 04:00 (verify your K8s cluster timezone; UTC is the default)
  schedule: "0 4 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never

          # --- K8s >= 1.28 native sidecar container ---
          initContainers:
          - name: redroid
            image: redroid/redroid:11.0.0-latest
            # Key: defined as sidecar; terminated when the main container exits
            restartPolicy: Always
            securityContext:
              privileged: true
            args:
              - "androidboot.redroid_gpu_mode=host" # Enable GPU hardware acceleration
              - "androidboot.use_memfd=1"
            ports:
              - containerPort: 5555
            volumeMounts:
              - name: redroid-userdata
                mountPath: /data
              - name: dev-dri
                mountPath: /dev/dri # Intel/AMD integrated GPU passthrough path

          # --- MAA main container (daily Nix build image) ---
          containers:
          - name: maa-cli
            image: ghcr.io/isning/maa-cli-debian:latest
            # Key: always pull the latest daily build image
            imagePullPolicy: Always
            command: ["/bin/sh", "-c"]
            args:
              - |
                echo "Waiting for Redroid to start and expose ADB port..."
                timeout=120
                elapsed=0
                until adb connect 127.0.0.1:5555; do
                  if [ "$elapsed" -ge "$timeout" ]; then
                    echo "Timed out waiting for ADB, exiting."
                    exit 1
                  fi
                  sleep 2
                  elapsed=$((elapsed + 2))
                done
                adb wait-for-device
                echo "ADB connected! Waiting for Android system to be ready (30s)..."
                sleep 30

                echo "Starting MAA tasks..."
                # Run directly; core and resources are bundled in the image
                maa run --config /etc/maa/maa-config.json

                echo "Tasks complete, main container exiting normally."
            volumeMounts:
              - name: maa-config-vol
                mountPath: /etc/maa/maa-config.json
                subPath: maa-config.json

          # --- Volume declarations ---
          volumes:
          - name: redroid-userdata
            persistentVolumeClaim:
              claimName: redroid-userdata-pvc
          - name: maa-config-vol
            configMap:
              name: maa-config
          - name: dev-dri
            hostPath:
              path: /dev/dri
              type: DirectoryOrCreate
