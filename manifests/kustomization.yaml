apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - redroid-pvc.yaml
  - maa-profile.yaml          # Shared connection profile (profiles/default.toml)
  - maa-instance-tasks.yaml   # Per-instance task ConfigMaps (maa-tasks-<instance>/default.toml)
  - redroid-instances.yaml
  - base.yaml                 # Shared base instance + init/update tasks
  - maa-task.yaml             # Daily MAA CronJob
  # On-demand one-shot example: example/maa-wakeinstance-task.yaml
